<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEO-LINK // CHUNKED TRANSFER</title>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- PeerJS -->
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>

    <!-- Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&display=swap');

        body {
            background-color: #050505;
            font-family: 'JetBrains Mono', monospace;
            color: #00ff41;
            overflow-x: hidden;
        }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #111; }
        ::-webkit-scrollbar-thumb { background: #00ff41; }

        .scanlines {
            background: linear-gradient(to bottom, rgba(255,255,255,0), rgba(255,255,255,0) 50%, rgba(0,0,0,0.2) 50%, rgba(0,0,0,0.2));
            background-size: 100% 4px;
            position: fixed; top: 0; right: 0; bottom: 0; left: 0;
            pointer-events: none; z-index: 50;
        }
        
        .glow-text { text-shadow: 0 0 10px rgba(0, 255, 65, 0.7); }
        
        .progress-bar-striped {
            background-image: linear-gradient(45deg,rgba(0,0,0,.15) 25%,transparent 25%,transparent 50%,rgba(0,0,0,.15) 50%,rgba(0,0,0,.15) 75%,transparent 75%,transparent);
            background-size: 1rem 1rem;
        }
    </style>
</head>
<body>
    <div id="root"></div>
    <div class="scanlines"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- CONFIGURATION ---
        const CHUNK_SIZE = 16384;        // 16KB per chunk
        const MAX_BUFFERED_AMOUNT = 262144; // 256KB backpressure threshold
        const CONNECT_TIMEOUT_MS = 30000;   // 30s connection timeout for receiver

        // --- PEERJS ERROR TYPE → HUMAN MESSAGE ---
        const PEER_ERROR_MESSAGES = {
            'peer-unavailable':  '!! FREQUENCY NOT FOUND. CHECK THE CODE !!',
            'network':           '!! NETWORK ERROR. CHECK CONNECTION !!',
            'server-error':      '!! SIGNALING SERVER ERROR !!',
            'socket-error':      '!! SOCKET ERROR !!',
            'socket-closed':     '!! SOCKET CLOSED UNEXPECTEDLY !!',
            'unavailable-id':    '!! FREQUENCY ALREADY IN USE !!',
            'invalid-id':        '!! INVALID FREQUENCY CODE !!',
            'ssl-unavailable':   '!! SSL/HTTPS REQUIRED FOR WEBRTC !!',
            'disconnected':      '!! DISCONNECTED FROM SIGNALING SERVER !!',
            'webrtc':            '!! WEBRTC NOT SUPPORTED IN THIS BROWSER !!',
        };
        const peerErrorMsg = (err) =>
            PEER_ERROR_MESSAGES[err.type] || `!! PEER ERROR: ${err.message || err.type || 'UNKNOWN'} !!`;

        // --- HELPER: FILE READER ---
        const readFileChunk = (file, offset, length) => {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                const blob = file.slice(offset, offset + length);
                reader.onload = (e) => resolve(e.target.result);
                reader.onerror = (e) => reject(e);
                reader.readAsArrayBuffer(blob);
            });
        };

        // --- HELPER: BACKPRESSURE-AWARE SEND ---
        // Waits until the data channel buffer drains below the threshold, then sends.
        const sendWithBackpressure = (conn, data) => {
            return new Promise((resolve) => {
                const trySend = () => {
                    const dc = conn.dataChannel;
                    if (dc && dc.bufferedAmount > MAX_BUFFERED_AMOUNT) {
                        setTimeout(trySend, 50);
                    } else {
                        conn.send(data);
                        resolve();
                    }
                };
                trySend();
            });
        };

        // --- SENDER COMPONENT ---
        const SendTab = ({ setGlobalStatus }) => {
            const [file, setFile] = useState(null);
            const [code, setCode] = useState(null);
            const [progress, setProgress] = useState(0);
            const [transferState, setTransferState] = useState('idle'); // idle, waiting, sending, complete
            const peerRef = useRef(null);
            const connRef = useRef(null);
            const fileRef = useRef(null);          // stable ref for async callbacks
            const transferStateRef = useRef('idle'); // stale-closure-safe state mirror

            const setTState = (s) => { transferStateRef.current = s; setTransferState(s); };

            // Destroy peer and connection cleanly
            const destroyPeer = () => {
                if (connRef.current)  { try { connRef.current.close();   } catch(e){} connRef.current  = null; }
                if (peerRef.current)  { try { peerRef.current.destroy(); } catch(e){} peerRef.current  = null; }
            };

            // Cleanup on unmount (e.g. switching to Receive tab)
            useEffect(() => { return () => destroyPeer(); }, []);

            const handleCancel = () => {
                destroyPeer();
                setTState('idle');
                setFile(null); fileRef.current = null;
                setCode(null);
                setProgress(0);
                setGlobalStatus(">> TRANSFER CANCELLED.");
            };

            const handleFileChange = (e) => {
                const selected = e.target.files[0];
                if (!selected) return;
                // Destroy any existing peer before initialising a new one
                destroyPeer();
                setTState('idle');
                setProgress(0);
                setFile(selected);
                fileRef.current = selected;
                initializePeer(selected);
            };

            const initializePeer = (selectedFile) => {
                const generatedCode = Math.floor(100000 + Math.random() * 900000).toString();
                setCode(generatedCode);
                setTState('waiting');
                setGlobalStatus(">> INITIALIZING NODE. WAITING FOR HANDSHAKE...");

                const peer = new Peer(generatedCode, {
                    debug: 1,
                    config: { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] }
                });
                peerRef.current = peer;

                peer.on('error', (err) => {
                    setGlobalStatus(peerErrorMsg(err));
                    setTState('idle');
                    destroyPeer();
                });

                peer.on('connection', (conn) => {
                    setGlobalStatus(">> PEER LINKED. PREPARING UPLOAD...");
                    connRef.current = conn;

                    conn.on('error', (err) => {
                        setGlobalStatus(`!! LINK ERROR: ${err.message || err} !!`);
                        setTState('idle');
                    });

                    conn.on('close', () => {
                        if (transferStateRef.current !== 'complete') {
                            setGlobalStatus("!! LINK CLOSED UNEXPECTEDLY !!");
                            setTState('idle');
                        }
                    });

                    conn.on('open', () => {
                        startChunkedTransfer(conn, selectedFile);
                    });
                });
            };

            const startChunkedTransfer = async (conn, fileToSend) => {
                if (!fileToSend) return;
                setTState('sending');
                setGlobalStatus(`>> STARTING UPLOAD: ${fileToSend.name}`);

                try {
                    const totalChunks = Math.ceil(fileToSend.size / CHUNK_SIZE);

                    // 1. Send metadata first so receiver can allocate buffer
                    conn.send({
                        type: 'meta',
                        name: fileToSend.name,
                        size: fileToSend.size,
                        fileType: fileToSend.type,
                        totalChunks: totalChunks
                    });

                    // 2. Send chunks with backpressure pacing
                    let offset = 0;
                    for (let i = 0; i < totalChunks; i++) {
                        // Bail out if transfer was cancelled or link dropped
                        if (!connRef.current) {
                            setGlobalStatus("!! LINK LOST DURING UPLOAD !!");
                            setTState('idle');
                            return;
                        }

                        const chunkData = await readFileChunk(fileToSend, offset, CHUNK_SIZE);
                        await sendWithBackpressure(conn, { type: 'chunk', index: i, data: chunkData });
                        offset += CHUNK_SIZE;

                        const percent = Math.round(((i + 1) / totalChunks) * 100);
                        setProgress(percent);
                    }

                    setGlobalStatus(">> UPLOAD COMPLETE. CLOSING LINK.");
                    setTState('complete');
                    setTimeout(() => {
                        destroyPeer();
                        setTState('idle');
                        setFile(null); fileRef.current = null;
                        setCode(null);
                        setProgress(0);
                    }, 3000);

                } catch (err) {
                    console.error(err);
                    setGlobalStatus("!! UPLOAD ERROR: ABORTED !!");
                    setTState('idle');
                }
            };

            return (
                <div className="flex flex-col items-center w-full animate-fade-in space-y-6">
                    {!file ? (
                        <label className="flex flex-col items-center justify-center w-full h-64 border-2 border-dashed border-[#00ff41] rounded-lg cursor-pointer hover:bg-green-900/20 transition-all group">
                            <i className="ph ph-upload-simple text-6xl mb-4 text-green-500 group-hover:scale-110 transition-transform"></i>
                            <p className="mb-2 text-sm text-green-400 font-bold">SELECT DATA PACKAGE</p>
                            <input type="file" className="hidden" onChange={handleFileChange} />
                        </label>
                    ) : (
                        <div className="w-full text-center">
                            <div className="mb-6 p-4 border border-green-900 bg-green-900/10 rounded">
                                <p className="text-xs text-green-500">TARGET FILE:</p>
                                <p className="text-lg font-bold truncate">{file.name}</p>
                                <p className="text-xs text-green-600">{(file.size / 1024 / 1024).toFixed(2)} MB</p>
                            </div>

                            {transferState === 'waiting' && code && (
                                <div className="animate-pulse">
                                    <p className="text-sm text-green-500 mb-2 tracking-widest">SECURE FREQUENCY</p>
                                    <div className="text-6xl md:text-8xl font-extrabold glow-text text-white">
                                        {code.substring(0, 3)}-{code.substring(3, 6)}
                                    </div>
                                    <button
                                        onClick={handleCancel}
                                        className="mt-6 px-6 py-2 border border-red-700 text-red-500 text-xs font-bold rounded hover:bg-red-900/30 transition-all tracking-widest"
                                    >
                                        ✕ CANCEL
                                    </button>
                                </div>
                            )}

                            {transferState === 'sending' && (
                                <div className="w-full space-y-2">
                                    <div className="flex justify-between text-xs text-green-400">
                                        <span>UPLOADING PACKETS...</span>
                                        <span>{progress}%</span>
                                    </div>
                                    <div className="w-full h-4 bg-gray-900 border border-green-900 rounded overflow-hidden relative">
                                        <div 
                                            className="h-full bg-green-500 progress-bar-striped transition-all duration-100" 
                                            style={{ width: `${progress}%` }}
                                        ></div>
                                    </div>
                                </div>
                            )}

                            {transferState === 'complete' && (
                                <div className="text-xl font-bold text-green-400 animate-bounce">
                                    >> MISSION SUCCESSFUL
                                </div>
                            )}
                        </div>
                    )}
                </div>
            );
        };

        // --- RECEIVER COMPONENT ---
        const ReceiveTab = ({ setGlobalStatus }) => {
            const [inputCode, setInputCode] = useState("");
            const [progress, setProgress] = useState(0);
            const [isReceiving, setIsReceiving] = useState(false);

            // Refs for high-frequency data handling
            const peerRef = useRef(null);
            const connRef = useRef(null);
            const chunksRef = useRef([]);
            const metaRef = useRef(null);
            const receivedCountRef = useRef(0);   // O(1) progress tracking
            const connectTimeoutRef = useRef(null);
            const transferDoneRef = useRef(false); // stale-closure guard

            // Cleanup on unmount (e.g. switching to Send tab)
            useEffect(() => { return () => { clearConnectTimeout(); destroyPeer(); }; }, []);

            const clearConnectTimeout = () => {
                if (connectTimeoutRef.current) {
                    clearTimeout(connectTimeoutRef.current);
                    connectTimeoutRef.current = null;
                }
            };

            const destroyPeer = () => {
                clearConnectTimeout();
                if (connRef.current)  { try { connRef.current.close();   } catch(e){} connRef.current  = null; }
                if (peerRef.current)  { try { peerRef.current.destroy(); } catch(e){} peerRef.current  = null; }
            };

            // Auto-format input: strip non-digits, auto-insert dash after 3 digits
            const handleCodeInput = (e) => {
                const digits = e.target.value.replace(/\D/g, '').slice(0, 6);
                setInputCode(digits.length <= 3 ? digits : digits.slice(0, 3) + '-' + digits.slice(3));
            };

            const cleanCode = inputCode.replace(/\D/g, '');

            const handleConnect = () => {
                if (cleanCode.length < 6) return;

                // Destroy any leftover peer from a previous attempt
                destroyPeer();
                transferDoneRef.current = false;

                setGlobalStatus(`>> SCANNING FOR FREQUENCY ${cleanCode}...`);
                setIsReceiving(true);
                setProgress(0);
                chunksRef.current = [];
                metaRef.current = null;
                receivedCountRef.current = 0;

                const peer = new Peer(null, {
                    debug: 1,
                    config: { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] }
                });
                peerRef.current = peer;

                peer.on('error', (err) => {
                    clearConnectTimeout();
                    setGlobalStatus(peerErrorMsg(err));
                    setIsReceiving(false);
                    if (peerRef.current === peer) destroyPeer();
                });

                peer.on('open', () => {
                    const conn = peer.connect(cleanCode, { reliable: true });
                    connRef.current = conn;

                    // Connection timeout: sender not found within CONNECT_TIMEOUT_MS
                    connectTimeoutRef.current = setTimeout(() => {
                        if (!transferDoneRef.current) {
                            setGlobalStatus("!! TIMEOUT: FREQUENCY NOT FOUND OR OFFLINE !!");
                            setIsReceiving(false);
                            destroyPeer();
                        }
                    }, CONNECT_TIMEOUT_MS);

                    conn.on('open', () => {
                        clearConnectTimeout();
                        setGlobalStatus(">> LINK ESTABLISHED. AWAITING STREAM...");
                    });

                    conn.on('data', (data) => { handleIncomingData(data); });

                    conn.on('close', () => {
                        clearConnectTimeout();
                        if (!transferDoneRef.current) {
                            setGlobalStatus("!! CONNECTION LOST !!");
                            setIsReceiving(false);
                            destroyPeer();
                        }
                    });

                    conn.on('error', (err) => {
                        clearConnectTimeout();
                        setGlobalStatus(`!! CONNECTION ERROR: ${err.message || err} !!`);
                        setIsReceiving(false);
                        destroyPeer();
                    });
                });
            };

            const handleIncomingData = (data) => {
                try {
                    // 1. Handle Metadata
                    if (data.type === 'meta') {
                        metaRef.current = data;
                        chunksRef.current = new Array(data.totalChunks);
                        receivedCountRef.current = 0;
                        setGlobalStatus(`>> INCOMING: ${data.name} (${(data.size/1024/1024).toFixed(2)} MB)`);
                        return;
                    }

                    // 2. Handle Chunks — metadata must arrive first
                    if (data.type === 'chunk') {
                        if (!metaRef.current) return;

                        // Guard against duplicate delivery (undefined or null)
                        if (chunksRef.current[data.index] == null) {
                            chunksRef.current[data.index] = data.data;
                            receivedCountRef.current += 1; // O(1) counter
                        }

                        const total    = metaRef.current.totalChunks;
                        const received = receivedCountRef.current;
                        const percent  = Math.round((received / total) * 100);

                        // Only trigger a re-render when the displayed percentage changes
                        setProgress(prev => (prev !== percent ? percent : prev));

                        // 3. Reassembly on completion
                        if (received === total) {
                            transferDoneRef.current = true;
                            setGlobalStatus(">> ALL PACKETS SECURED. REASSEMBLING...");
                            finalizeDownload();
                        }
                    }
                } catch (err) {
                    console.error(err);
                    setGlobalStatus("!! PACKET CORRUPTION DETECTED !!");
                }
            };

            const finalizeDownload = () => {
                const meta = metaRef.current;
                const blob = new Blob(chunksRef.current, { type: meta.fileType });
                const url  = URL.createObjectURL(blob);

                const link = document.createElement('a');
                link.download = meta.name;
                link.href = url;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);

                URL.revokeObjectURL(url);
                setGlobalStatus(">> ASSET WRITTEN TO DISK.");

                setTimeout(() => {
                    destroyPeer();
                    setIsReceiving(false);
                    setProgress(0);
                    chunksRef.current = [];
                    metaRef.current = null;
                    receivedCountRef.current = 0;
                    transferDoneRef.current = false;
                }, 2000);
            };

            return (
                <div className="flex flex-col items-center w-full space-y-6">
                    {!isReceiving ? (
                        <>
                            <div className="w-full">
                                <label className="block text-xs text-green-500 mb-2 tracking-widest uppercase">Enter Source Frequency</label>
                                <input 
                                    type="text"
                                    inputMode="numeric"
                                    value={inputCode}
                                    onChange={handleCodeInput}
                                    onKeyDown={(e) => { if (e.key === 'Enter' && cleanCode.length === 6) handleConnect(); }}
                                    placeholder="000-000"
                                    maxLength="7"
                                    className="w-full bg-black border-2 border-green-800 focus:border-green-400 text-center text-4xl md:text-6xl py-4 outline-none text-white placeholder-green-900/50 font-bold tracking-widest rounded"
                                />
                            </div>
                            <button 
                                onClick={handleConnect}
                                disabled={cleanCode.length < 6}
                                className={`w-full py-6 text-xl font-bold border-2 border-green-500 bg-green-900/20 text-green-400 rounded uppercase tracking-widest hover:bg-green-500 hover:text-black transition-all
                                    ${cleanCode.length < 6 ? 'opacity-50 cursor-not-allowed' : ''}`}
                            >
                                Initiate Downlink
                            </button>
                        </>
                    ) : (
                        <div className="w-full text-center space-y-4">
                            <div className="animate-pulse mb-4">
                                <i className="ph ph-download-simple text-6xl text-green-500"></i>
                            </div>
                            <div>
                                <p className="text-xl font-bold text-white mb-2">RECEIVING DATA STREAM</p>
                                <div className="flex justify-between text-xs text-green-400 mb-1">
                                    <span>PACKETS SECURED</span>
                                    <span>{progress}%</span>
                                </div>
                                <div className="w-full h-6 bg-gray-900 border border-green-900 rounded overflow-hidden relative">
                                    <div 
                                        className="h-full bg-green-500 progress-bar-striped transition-all duration-200" 
                                        style={{ width: `${progress}%` }}
                                    ></div>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        // --- MAIN APP ---
        const App = () => {
            const [activeTab, setActiveTab] = useState('send');
            const [logs, setLogs] = useState([">> SYSTEM READY", ">> PROTOCOL V2.0 LOADED"]);

            const addLog = (msg) => setLogs(prev => [msg, ...prev].slice(0, 6));

            return (
                <div className="min-h-screen flex flex-col items-center p-4 md:p-8 max-w-2xl mx-auto relative z-10">
                    <header className="w-full flex justify-between items-end mb-12 border-b-2 border-green-800 pb-4">
                        <div>
                            <h1 className="text-3xl md:text-4xl font-black italic tracking-tighter glow-text">NEO-LINK</h1>
                            <p className="text-xs text-green-600">CHUNKED MESH TRANSFER</p>
                        </div>
                        <div className="text-right hidden md:block text-xs text-green-800">
                            <p>CHUNK_SIZE: 16KB</p>
                            <p>BACKPRESSURE: 256KB</p>
                        </div>
                    </header>

                    <main className="w-full bg-gray-900/80 border border-green-900 backdrop-blur-md p-1 rounded-lg shadow-[0_0_30px_rgba(0,255,65,0.15)]">
                        <div className="flex w-full mb-1">
                            {['send', 'receive'].map(tab => (
                                <button 
                                    key={tab}
                                    onClick={() => setActiveTab(tab)}
                                    className={`flex-1 py-4 font-bold tracking-widest uppercase transition-colors ${
                                        activeTab === tab 
                                        ? 'bg-green-500 text-black' 
                                        : 'bg-black text-green-600 hover:bg-green-900/30'
                                    }`}
                                >
                                    {tab}
                                </button>
                            ))}
                        </div>

                        <div className="bg-black border-2 border-green-900 p-6 md:p-10 min-h-[450px] flex items-center relative">
                            <div className="absolute top-2 left-2 text-[10px] text-green-900 font-bold">ENCRYPTION: DTLS 1.2</div>
                            {activeTab === 'send' ? <SendTab setGlobalStatus={addLog} /> : <ReceiveTab setGlobalStatus={addLog} />}
                        </div>
                    </main>

                    <div className="w-full mt-6 border-t border-green-900 pt-4">
                        <div className="flex items-center gap-2 mb-2">
                            <div className="w-2 h-2 bg-green-500 rounded-full animate-pulse"></div>
                            <span className="text-xs font-bold bg-green-900/30 px-2 py-0.5 rounded">KERNEL LOG</span>
                        </div>
                        <div className="font-mono text-xs space-y-1 text-green-400/80 h-24 overflow-hidden">
                            {logs.map((log, i) => (
                                <div key={i} className={i === 0 ? "text-green-300 font-bold" : "opacity-50"}>{log}</div>
                            ))}
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
